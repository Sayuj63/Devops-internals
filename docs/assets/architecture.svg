<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="JetBrains Mono, monospace" font-size="12">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="1" opacity="0.4"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <style>
      .layer-label { fill:#6B7280; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; }
      .box { fill:#0B0F1A; stroke:#1F2937; stroke-width:1; }
      .box-client { stroke:#22D3EE; }
      .box-edge { stroke:#22D3EE; }
      .box-compute { stroke:#8B5CF6; }
      .box-data { stroke:#10B981; }
      .box-obs { stroke:#F59E0B; }
      .box-sec { stroke:#F43F5E; }
      .title { fill:#E5E7EB; font-size:13px; }
      .sub { fill:#9CA3AF; font-size:10px; }
      .line { stroke:#6B7280; stroke-width:1; fill:none; }
      .line-dashed { stroke:#6B7280; stroke-width:1; fill:none; stroke-dasharray:4 4; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#05070D"/>
  <rect width="1200" height="720" fill="url(#grid)"/>

  <!-- Layer labels left rail -->
  <text x="24" y="100" class="layer-label">Client</text>
  <text x="24" y="200" class="layer-label">Edge</text>
  <text x="24" y="340" class="layer-label">Compute</text>
  <text x="24" y="520" class="layer-label">Data + Secrets</text>
  <text x="24" y="660" class="layer-label">Observability</text>

  <line x1="120" y1="60" x2="120" y2="700" class="line-dashed"/>

  <!-- Client -->
  <g>
    <rect x="500" y="60" width="200" height="64" rx="10" class="box box-client"/>
    <text x="600" y="90" text-anchor="middle" class="title">Operator Browser</text>
    <text x="600" y="108" text-anchor="middle" class="sub">HTML · Tailwind · vanilla JS</text>
  </g>

  <!-- Edge -->
  <g>
    <rect x="500" y="170" width="200" height="64" rx="10" class="box box-edge"/>
    <text x="600" y="200" text-anchor="middle" class="title">AWS ALB / Ingress</text>
    <text x="600" y="218" text-anchor="middle" class="sub">TLS termination · WAF</text>
  </g>

  <!-- Compute row -->
  <g>
    <rect x="220" y="290" width="200" height="84" rx="10" class="box box-compute"/>
    <text x="320" y="320" text-anchor="middle" class="title">Web Pod ×2</text>
    <text x="320" y="338" text-anchor="middle" class="sub">nginx · static dashboard</text>
    <text x="320" y="358" text-anchor="middle" class="sub">distroless · readonlyRootFS</text>
  </g>
  <g>
    <rect x="500" y="290" width="200" height="84" rx="10" class="box box-compute"/>
    <text x="600" y="320" text-anchor="middle" class="title">API Pod ×3 (HPA)</text>
    <text x="600" y="338" text-anchor="middle" class="sub">FastAPI · uvicorn</text>
    <text x="600" y="358" text-anchor="middle" class="sub">/activate · /port · /query</text>
  </g>
  <g>
    <rect x="780" y="290" width="200" height="84" rx="10" class="box box-compute"/>
    <text x="880" y="320" text-anchor="middle" class="title">Worker Pod ×2</text>
    <text x="880" y="338" text-anchor="middle" class="sub">SIM state machine</text>
    <text x="880" y="358" text-anchor="middle" class="sub">PENDING → ACTIVE → …</text>
  </g>

  <!-- Mock HLR sidecar -->
  <g>
    <rect x="1020" y="290" width="160" height="84" rx="10" class="box box-compute"/>
    <text x="1100" y="320" text-anchor="middle" class="title">Mock HLR/HSS</text>
    <text x="1100" y="338" text-anchor="middle" class="sub">sidecar adapter</text>
    <text x="1100" y="358" text-anchor="middle" class="sub">replaces real telco gear</text>
  </g>

  <!-- Data layer -->
  <g>
    <rect x="320" y="470" width="220" height="80" rx="10" class="box box-data"/>
    <text x="430" y="500" text-anchor="middle" class="title">PostgreSQL · RDS Multi-AZ</text>
    <text x="430" y="518" text-anchor="middle" class="sub">SIM inventory · MSISDN pool</text>
    <text x="430" y="536" text-anchor="middle" class="sub">audit_events · PITR · 5m RPO</text>
  </g>
  <g>
    <rect x="600" y="470" width="180" height="80" rx="10" class="box box-sec"/>
    <text x="690" y="500" text-anchor="middle" class="title">HashiCorp Vault</text>
    <text x="690" y="518" text-anchor="middle" class="sub">DB creds · API tokens</text>
    <text x="690" y="536" text-anchor="middle" class="sub">Agent Injector · Raft</text>
  </g>
  <g>
    <rect x="840" y="470" width="180" height="80" rx="10" class="box box-data"/>
    <text x="930" y="500" text-anchor="middle" class="title">S3 · Backups</text>
    <text x="930" y="518" text-anchor="middle" class="sub">Raft snapshots</text>
    <text x="930" y="536" text-anchor="middle" class="sub">ES snapshots · audit dumps</text>
  </g>

  <!-- Observability -->
  <g>
    <rect x="180" y="620" width="160" height="64" rx="10" class="box box-obs"/>
    <text x="260" y="650" text-anchor="middle" class="title">Prometheus</text>
    <text x="260" y="668" text-anchor="middle" class="sub">scrape · recording rules</text>
  </g>
  <g>
    <rect x="360" y="620" width="160" height="64" rx="10" class="box box-obs"/>
    <text x="440" y="650" text-anchor="middle" class="title">Grafana</text>
    <text x="440" y="668" text-anchor="middle" class="sub">RED + SLO dashboards</text>
  </g>
  <g>
    <rect x="540" y="620" width="160" height="64" rx="10" class="box box-obs"/>
    <text x="620" y="650" text-anchor="middle" class="title">Alertmanager</text>
    <text x="620" y="668" text-anchor="middle" class="sub">8 rules → Slack/PagerDuty</text>
  </g>
  <g>
    <rect x="720" y="620" width="160" height="64" rx="10" class="box box-obs"/>
    <text x="800" y="650" text-anchor="middle" class="title">Elasticsearch</text>
    <text x="800" y="668" text-anchor="middle" class="sub">hot/warm tiers</text>
  </g>
  <g>
    <rect x="900" y="620" width="160" height="64" rx="10" class="box box-obs"/>
    <text x="980" y="650" text-anchor="middle" class="title">Kibana + Logstash</text>
    <text x="980" y="668" text-anchor="middle" class="sub">Filebeat shippers</text>
  </g>

  <!-- Connectors -->
  <line x1="600" y1="124" x2="600" y2="166" class="line" marker-end="url(#arrow)"/>
  <line x1="600" y1="234" x2="600" y2="286" class="line" marker-end="url(#arrow)"/>
  <line x1="540" y1="234" x2="320" y2="286" class="line" marker-end="url(#arrow)"/>
  <line x1="660" y1="234" x2="880" y2="286" class="line" marker-end="url(#arrow)"/>

  <!-- compute -> data -->
  <line x1="600" y1="374" x2="430" y2="466" class="line" marker-end="url(#arrow)"/>
  <line x1="600" y1="374" x2="690" y2="466" class="line" marker-end="url(#arrow)"/>
  <line x1="880" y1="374" x2="690" y2="466" class="line" marker-end="url(#arrow)"/>
  <line x1="880" y1="374" x2="930" y2="466" class="line-dashed"/>

  <!-- worker -> HLR -->
  <line x1="980" y1="332" x2="1018" y2="332" class="line" marker-end="url(#arrow)"/>

  <!-- compute -> observability (scrape) -->
  <line x1="320" y1="374" x2="260" y2="618" class="line-dashed"/>
  <line x1="600" y1="374" x2="440" y2="618" class="line-dashed"/>
  <line x1="880" y1="374" x2="800" y2="618" class="line-dashed"/>

  <!-- legend -->
  <g transform="translate(900,40)">
    <rect x="0" y="0" width="280" height="80" rx="8" fill="#0B0F1A" stroke="#1F2937"/>
    <text x="14" y="20" class="layer-label">Layer legend</text>
    <circle cx="20" cy="40" r="5" fill="#22D3EE"/><text x="32" y="44" class="sub">client / edge</text>
    <circle cx="120" cy="40" r="5" fill="#8B5CF6"/><text x="132" y="44" class="sub">compute</text>
    <circle cx="220" cy="40" r="5" fill="#10B981"/><text x="232" y="44" class="sub">data</text>
    <circle cx="20" cy="62" r="5" fill="#F43F5E"/><text x="32" y="66" class="sub">secrets</text>
    <circle cx="120" cy="62" r="5" fill="#F59E0B"/><text x="132" y="66" class="sub">observability</text>
  </g>
</svg>
