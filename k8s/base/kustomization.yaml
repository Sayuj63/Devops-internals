apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sim-prov

commonLabels:
  app.kubernetes.io/part-of: sim-prov-platform
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - api-deployment.yaml
  - api-service.yaml
  - api-hpa.yaml
  - api-pdb.yaml
  - api-networkpolicy.yaml
  - worker-deployment.yaml
  - mock-hlr-deployment.yaml
  - frontend-deployment.yaml
  - ingress.yaml

images:
  - name: sim-prov/api
    newName: ghcr.io/itm-skills/sim-prov/api
    newTag: latest
  - name: sim-prov/worker
    newName: ghcr.io/itm-skills/sim-prov/worker
    newTag: latest
  - name: sim-prov/mock-hlr
    newName: ghcr.io/itm-skills/sim-prov/mock-hlr
    newTag: latest
  - name: sim-prov/frontend
    newName: ghcr.io/itm-skills/sim-prov/frontend
    newTag: latest
