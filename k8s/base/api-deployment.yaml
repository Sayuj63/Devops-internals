apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: sim-prov
  labels:
    app.kubernetes.io/name: sim-prov
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sim-prov-platform
spec:
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sim-prov
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sim-prov
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sim-prov-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8000"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "sim-prov-api"
        vault.hashicorp.com/agent-inject-secret-db.env: "secret/data/sim-prov/db"
        vault.hashicorp.com/agent-inject-template-db.env: |
          {{- with secret "secret/data/sim-prov/db" -}}
          DATABASE_URL=postgresql+psycopg://{{ .Data.data.username }}:{{ .Data.data.password }}@{{ .Data.data.host }}:{{ .Data.data.port }}/{{ .Data.data.dbname }}
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-hlr.env: "secret/data/sim-prov/hlr"
        vault.hashicorp.com/agent-inject-template-hlr.env: |
          {{- with secret "secret/data/sim-prov/hlr" -}}
          HLR_API_KEY={{ .Data.data.api_key }}
          {{- end }}
    spec:
      serviceAccountName: sim-prov-api
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sim-prov
              app.kubernetes.io/component: api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: sim-prov
                    app.kubernetes.io/component: api
      containers:
        - name: api
          image: sim-prov/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef: { name: sim-prov-config }
          env:
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 30
            periodSeconds: 2
          lifecycle:
            preStop:
              exec: { command: ["/bin/sh", "-c", "sleep 10"] }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/app
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
        - name: cache
          emptyDir: { sizeLimit: 128Mi }
