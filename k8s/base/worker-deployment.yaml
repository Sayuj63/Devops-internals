apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: sim-prov
  labels:
    app.kubernetes.io/name: sim-prov
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: sim-prov-platform
spec:
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sim-prov
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sim-prov
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: sim-prov-platform
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "sim-prov-worker"
        vault.hashicorp.com/agent-inject-secret-db.env: "secret/data/sim-prov/db"
        vault.hashicorp.com/agent-inject-template-db.env: |
          {{- with secret "secret/data/sim-prov/db" -}}
          DATABASE_URL=postgresql+psycopg://{{ .Data.data.username }}:{{ .Data.data.password }}@{{ .Data.data.host }}:{{ .Data.data.port }}/{{ .Data.data.dbname }}
          {{- end }}
    spec:
      serviceAccountName: sim-prov-worker
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sim-prov
              app.kubernetes.io/component: worker
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: sim-prov
                    app.kubernetes.io/component: worker
      containers:
        - name: worker
          image: sim-prov/worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: sim-prov-config }
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          resources:
            requests: { cpu: 250m, memory: 384Mi }
            limits:   { cpu: "1",  memory: 768Mi }
          livenessProbe:
            exec:
              command: ["/opt/venv/bin/python", "-c", "import pathlib,sys; sys.exit(0 if pathlib.Path('/tmp/worker.alive').exists() else 1)"]
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/opt/venv/bin/python", "-c", "import pathlib,sys; sys.exit(0 if pathlib.Path('/tmp/worker.ready').exists() else 1)"]
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
