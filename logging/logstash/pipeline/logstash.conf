input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {
  # If filebeat sent us a JSON message string, parse it.
  if [message] =~ /^\s*\{.*\}\s*$/ {
    json {
      source        => "message"
      target        => "app"
      remove_field  => ["message"]
      skip_on_invalid_json => true
    }
  }

  # Promote common application fields.
  if [app] {
    if [app][level]      { mutate { add_field => { "level"      => "%{[app][level]}" } } }
    if [app][logger]     { mutate { add_field => { "logger"     => "%{[app][logger]}" } } }
    if [app][request_id] { mutate { add_field => { "request_id" => "%{[app][request_id]}" } } }
    if [app][iccid]      { mutate { add_field => { "iccid"      => "%{[app][iccid]}" } } }
    if [app][msisdn]     { mutate { add_field => { "msisdn"     => "%{[app][msisdn]}" } } }
    if [app][status]     { mutate { add_field => { "sim_status" => "%{[app][status]}" } } }
    if [app][event]      { mutate { add_field => { "event"      => "%{[app][event]}" } } }
    if [app][duration_ms]{ mutate { add_field => { "duration_ms"=> "%{[app][duration_ms]}" } convert => { "duration_ms" => "float" } } }
  }

  # Normalise log level to upper-case.
  if [level] {
    mutate { uppercase => ["level"] }
  } else {
    mutate { add_field => { "level" => "INFO" } }
  }

  # Container metadata from filebeat autodiscover.
  if [container][name] {
    mutate { add_field => { "service" => "%{[container][name]}" } }
  }

  # geoip stub — if a client IP is present, enrich it.
  if [app][client_ip] {
    geoip {
      source => "[app][client_ip]"
      target => "geoip"
      tag_on_failure => ["_geoip_lookup_failure"]
    }
  }

  # Drop noisy kubelet liveness probes.
  if [app][route] == "/healthz" or [app][route] == "/readyz" {
    drop {}
  }

  mutate {
    remove_field => ["agent", "ecs", "host", "log", "input", "stream"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "sim-prov-%{+YYYY.MM.dd}"
    action => "create"
    manage_template => true
    template_overwrite => true
    template_name => "sim-prov"
  }

  if [level] == "ERROR" or [level] == "CRITICAL" {
    stdout { codec => rubydebug { metadata => false } }
  }
}
