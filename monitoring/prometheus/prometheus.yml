global:
  scrape_interval:     15s
  scrape_timeout:      10s
  evaluation_interval: 15s
  external_labels:
    cluster: sim-prov
    region:  ap-south-1

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Docker-compose static targets (local stack)
  - job_name: sim-prov-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels: { service: api, component: api }

  - job_name: mock-hlr
    metrics_path: /metrics
    static_configs:
      - targets: ["mock-hlr:9000"]
        labels: { service: mock-hlr, component: mock-hlr }

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels: { service: node-exporter }

  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics:8080"]
        labels: { service: kube-state-metrics }

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels: { service: postgres-exporter }

  # Kubernetes service discovery — used when running inside the cluster.
  # Annotate pods with prometheus.io/scrape=true, prometheus.io/port=<port>,
  # prometheus.io/path=<path>.
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  - job_name: kubernetes-service-endpoints
    kubernetes_sd_configs:
      - role: endpoints
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        target_label: service

  - job_name: blackbox-https
    metrics_path: /probe
    params: { module: [http_2xx] }
    static_configs:
      - targets:
          - https://sim-prov.example.com/healthz
        labels: { probe: external_healthz }
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
